name: Evaluation Suite

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday
  workflow_dispatch:
    inputs:
      test_subset:
        description: 'Test subset to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - retrieval
          - generation
          - performance

env:
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
  DATABASE_URL: ${{ secrets.DATABASE_URL }}

jobs:
  evaluation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-evaluation-${{ hashFiles('requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-evaluation-

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run retrieval quality tests
        if: inputs.test_subset == 'all' || inputs.test_subset == 'retrieval'
        run: |
          pytest tests/evaluation/test_retrieval_quality.py -v --tb=short

      - name: Run generation quality tests
        if: inputs.test_subset == 'all' || inputs.test_subset == 'generation'
        run: |
          pytest tests/evaluation/test_generation_quality.py -v --tb=short

      - name: Run performance tests
        if: inputs.test_subset == 'all' || inputs.test_subset == 'performance'
        run: |
          pytest tests/evaluation/test_performance.py -v --tb=short

      - name: Run full evaluation suite
        if: inputs.test_subset == 'all'
        run: |
          python scripts/run_evaluation.py
        continue-on-error: true

      - name: Upload evaluation results
        if: inputs.test_subset == 'all'
        uses: actions/upload-artifact@v4
        with:
          name: evaluation-results
          path: evaluation_results.md
          retention-days: 30

      - name: Comment PR with results
        if: github.event_name == 'pull_request' && inputs.test_subset == 'all'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (!fs.existsSync('evaluation_results.md')) {
              console.log('No evaluation results found');
              return;
            }
            const results = fs.readFileSync('evaluation_results.md', 'utf8');
            
            // Create comment body
            const body = `## 📊 RAG System Evaluation Results\n\n${results}\n\n---\n_Generated by GitHub Actions_`;
            
            // Get existing comments
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            // Find evaluation comment
            const evalComment = comments.find(c => c.body.includes('RAG System Evaluation Results'));
            
            if (evalComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: evalComment.id,
                body: body,
              });
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }

      - name: Check for failures
        if: failure() && inputs.test_subset == 'all'
        run: |
          echo "::warning::Some evaluation tests failed. Check the results above."

  generate-report:
    runs-on: ubuntu-latest
    needs: evaluation
    if: always() && needs.evaluation.result == 'failure'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create failure report
        run: |
          echo "# Evaluation Failed" >> evaluation_failure.md
          echo "" >> evaluation_failure.md
          echo "Some evaluation tests did not meet the target thresholds." >> evaluation_failure.md
          echo "" >> evaluation_failure.md
          echo "Please review the test output above and address any issues." >> evaluation_failure.md
          
      - name: Upload failure report
        uses: actions/upload-artifact@v4
        with:
          name: evaluation-failure-report
          path: evaluation_failure.md
